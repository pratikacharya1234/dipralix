name: release-binaries

on:
  release:
    types: [published, created]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to attach the binaries to (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
            bin: dipralix-cli
            asset_suffix: linux-x86_64
          - os: macos-13
            target: x86_64-apple-darwin
            archive: tar.gz
            bin: dipralix-cli
            asset_suffix: macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
            bin: dipralix-cli
            asset_suffix: macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            bin: dipralix-cli.exe
            asset_suffix: windows-x86_64

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout tag
        shell: bash
        run: |
          git fetch --tags --force
          git checkout "${{ steps.tag.outputs.tag }}"

      - name: Build (release)
        run: cargo build --release --target ${{ matrix.target }} --bin dipralix-cli --bin dipralix-server

      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          mkdir -p packages
          cp "target/${{ matrix.target }}/release/dipralix-cli" "./dipralix-cli"
          cp "target/${{ matrix.target }}/release/dipralix-server" "./dipralix-server"
          tar -czf "packages/dipralix-${{ steps.tag.outputs.tag }}-${{ matrix.asset_suffix }}.tar.gz" dipralix-cli dipralix-server
          rm "./dipralix-cli" "./dipralix-server"

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path packages | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/dipralix-cli.exe" -Destination "./dipralix-cli.exe"
          Copy-Item "target/${{ matrix.target }}/release/dipralix-server.exe" -Destination "./dipralix-server.exe"
          Compress-Archive -Path "dipralix-cli.exe","dipralix-server.exe" -DestinationPath "packages/dipralix-${{ steps.tag.outputs.tag }}-${{ matrix.asset_suffix }}.zip" -Force
          Remove-Item "./dipralix-cli.exe","./dipralix-server.exe"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: packages/dipralix-${{ steps.tag.outputs.tag }}-${{ matrix.asset_suffix }}.${{ matrix.archive }}
