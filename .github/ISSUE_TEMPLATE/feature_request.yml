name: Feature request
description: Suggest a new capability for Dipralix.
title: "feat: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea. Keep it scoped: one feature per issue.

  - type: textarea
    id: problem
    attributes:
      label: The problem
      description: What can't you do today? Or what's painful about how you have to do it?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like it to work? Slash command? CLI flag? Config option? Be specific.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why you didn't pick them.

  - type: dropdown
    id: layer
    attributes:
      label: Which layer
      options:
        - Agent loop / orchestrator
        - Tools (file, bash, etc.)
        - Integrations (GitHub, Gmail, Drive, Discord)
        - MCP
        - Safety / approval matrix
        - UI / terminal
        - IDE bridge (VS Code, comment protocol)
        - Build / install / distribution
    validations:
      required: true
