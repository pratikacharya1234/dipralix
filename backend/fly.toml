app = "dipralix-stats"
primary_region = "iad"

[build]

[env]
  PORT = "8080"
  CORS_ORIGIN = "*"
  RUST_LOG = "info,axum=info,tower_http=info"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period  = "10s"
    interval      = "30s"
    method        = "get"
    path          = "/healthz"
    protocol      = "http"
    timeout       = "5s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
